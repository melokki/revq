<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="164" y1="132" x2="863" y2="916" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A2F37"/>
      <stop offset="0.42" stop-color="#171D24"/>
      <stop offset="1" stop-color="#0B1015"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(512 498) rotate(90) scale(430 430)">
      <stop offset="0" stop-color="#1E242D" stop-opacity="0.80"/>
      <stop offset="0.55" stop-color="#10161C" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0B1015" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="qGrad" x1="275" y1="176" x2="780" y2="842" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C5CF68"/>
      <stop offset="0.24" stop-color="#AEB94E"/>
      <stop offset="0.66" stop-color="#8C9733"/>
      <stop offset="1" stop-color="#6A7621"/>
    </linearGradient>

    <linearGradient id="tailGrad" x1="535" y1="640" x2="709" y2="801" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BBC75A"/>
      <stop offset="0.45" stop-color="#A5B247"/>
      <stop offset="1" stop-color="#768325"/>
    </linearGradient>

    <linearGradient id="qDepthGrad" x1="290" y1="195" x2="755" y2="790" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DDE59D" stop-opacity="0.24"/>
      <stop offset="0.20" stop-color="#CDD77E" stop-opacity="0.12"/>
      <stop offset="0.48" stop-color="#AFBA58" stop-opacity="0.03"/>
      <stop offset="0.72" stop-color="#66721F" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#333D10" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="cardBackGrad" x1="346" y1="341" x2="628" y2="593" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2D333C"/>
      <stop offset="1" stop-color="#181E25"/>
    </linearGradient>

    <linearGradient id="cardFrontGrad" x1="335" y1="390" x2="662" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242B34"/>
      <stop offset="0.5" stop-color="#151B22"/>
      <stop offset="1" stop-color="#10151C"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="452" y1="459" x2="575" y2="583" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#66707A"/>
      <stop offset="1" stop-color="#3D444C"/>
    </linearGradient>

    <linearGradient id="amberGrad" x1="570" y1="470" x2="700" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD66E"/>
      <stop offset="0.30" stop-color="#F7BC38"/>
      <stop offset="0.72" stop-color="#D89417"/>
      <stop offset="1" stop-color="#B87508"/>
    </linearGradient>

    <linearGradient id="amberBarsGrad" x1="724" y1="721" x2="825" y2="813" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD974"/>
      <stop offset="0.32" stop-color="#F7BE3D"/>
      <stop offset="0.74" stop-color="#DA9819"/>
      <stop offset="1" stop-color="#BD7B0A"/>
    </linearGradient>

    <linearGradient id="amberHighlight" x1="605" y1="485" x2="675" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF0A6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFF0A6" stop-opacity="0"/>
    </linearGradient>

    <filter id="bgShadow" x="38" y="46" width="948" height="948" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset in="SourceAlpha" dx="0" dy="20" result="off"/>
      <feGaussianBlur in="off" stdDeviation="15" result="blur"/>
      <feFlood flood-color="#000000" flood-opacity="0.24" result="shadowColor"/>
      <feComposite in="shadowColor" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadowMedium" x="-25%" y="-25%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feOffset in="SourceAlpha" dx="0" dy="16" result="off"/>
      <feGaussianBlur in="off" stdDeviation="14" result="blur"/>
      <feFlood flood-color="#000000" flood-opacity="0.34" result="shadowColor"/>
      <feComposite in="shadowColor" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadowSoft" x="-25%" y="-25%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feOffset in="SourceAlpha" dx="0" dy="10" result="off"/>
      <feGaussianBlur in="off" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#000000" flood-opacity="0.28" result="shadowColor"/>
      <feComposite in="shadowColor" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadowInnerSoft" x="-25%" y="-25%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feOffset in="SourceAlpha" dx="0" dy="6" result="off"/>
      <feGaussianBlur in="off" stdDeviation="7" result="blur"/>
      <feFlood flood-color="#000000" flood-opacity="0.24" result="shadowColor"/>
      <feComposite in="shadowColor" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="tinyGlow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <g filter="url(#bgShadow)">
    <rect x="96" y="94" width="832" height="832" rx="142" fill="url(#bgGrad)"/>
    <rect x="96" y="94" width="832" height="832" rx="142" fill="url(#bgGlow)"/>
    <rect x="97.5" y="95.5" width="829" height="829" rx="140.5" stroke="#89919B" stroke-opacity="0.40" stroke-width="3"/>
    <rect x="103" y="101" width="818" height="818" rx="136" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="2"/>
  </g>

  <!-- Main Q ring -->
  <g filter="url(#shadowMedium)">
    <circle cx="503" cy="470" r="281" stroke="url(#qGrad)" stroke-width="96" stroke-linecap="round"/>
    <circle cx="503" cy="470" r="281" stroke="url(#qDepthGrad)" stroke-width="96" stroke-linecap="round"/>
  </g>

  <!-- Inner dark cavity -->
  <circle cx="503" cy="470" r="198" fill="url(#bgGlow)" opacity="0.88"/>

  <!-- Stacked cards -->
  <g filter="url(#shadowSoft)">
    <rect x="347" y="343" width="280" height="154" rx="24" fill="url(#cardBackGrad)" fill-opacity="0.82" stroke="#77818D" stroke-opacity="0.38" stroke-width="2"/>
    <rect x="332" y="376" width="308" height="170" rx="26" fill="url(#cardBackGrad)" fill-opacity="0.88" stroke="#7A8590" stroke-opacity="0.40" stroke-width="2"/>
    <rect x="317" y="409" width="344" height="214" rx="28" fill="url(#cardFrontGrad)" stroke="#96A1AC" stroke-opacity="0.56" stroke-width="2.2"/>
  </g>

  <!-- subtle lens glow on front card -->
  <ellipse cx="345" cy="453" rx="18" ry="32" fill="#DDF288" fill-opacity="0.10" filter="url(#tinyGlow)"/>

  <!-- Branch icon -->
  <g filter="url(#shadowInnerSoft)">
    <circle cx="364" cy="464" r="18" fill="#151B20" stroke="url(#qGrad)" stroke-width="7"/>
    <circle cx="364" cy="570" r="18" fill="#151B20" stroke="url(#qGrad)" stroke-width="7"/>
    <circle cx="411" cy="541" r="16" fill="#151B20" stroke="url(#qGrad)" stroke-width="7"/>
    <path d="M364 482V552" stroke="url(#qGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M377 474C388 489 399 498 405 506C411 514 412 522 412 525" stroke="url(#qGrad)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Text lines -->
  <g opacity="0.95">
    <rect x="444" y="459" width="123" height="18" rx="9" fill="url(#lineGrad)"/>
    <rect x="444" y="513" width="88" height="18" rx="9" fill="url(#lineGrad)"/>
    <rect x="444" y="565" width="100" height="18" rx="9" fill="url(#lineGrad)"/>
  </g>

  <!-- Check badge -->
  <g filter="url(#shadowSoft)">
    <circle cx="588" cy="536" r="53" fill="#1A1F25" stroke="url(#amberGrad)" stroke-width="8"/>
    <circle cx="588" cy="536" r="45" stroke="url(#amberHighlight)" stroke-width="2" opacity="0.82"/>
    <path d="M568 536L582 551L609 520" stroke="url(#amberGrad)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Q tail -->
  <g filter="url(#shadowMedium)">
    <path d="M524 640H592C600 640 606 643 611 648L708 745C716 753 716 766 708 774L680 801C673 808 664 809 657 803L526 662C518 655 516 647 524 640Z"
      fill="url(#tailGrad)"/>
    <path d="M532 643H591C597 643 603 646 607 651L697 738" stroke="#E7EFB2" stroke-opacity="0.11" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Accent bars -->
  <g filter="url(#shadowSoft)">
    <rect x="714" y="721" width="101" height="22" rx="11" fill="url(#amberBarsGrad)"/>
    <rect x="729" y="757" width="74" height="20" rx="10" fill="url(#amberBarsGrad)"/>
    <rect x="750" y="795" width="46" height="18" rx="9" fill="url(#amberBarsGrad)"/>
    <rect x="716" y="723" width="97" height="4" rx="2" fill="#FFF0B0" opacity="0.31"/>
    <rect x="731" y="759" width="70" height="4" rx="2" fill="#FFF0B0" opacity="0.31"/>
    <rect x="752" y="797" width="42" height="4" rx="2" fill="#FFF0B0" opacity="0.31"/>
  </g>
</svg>
